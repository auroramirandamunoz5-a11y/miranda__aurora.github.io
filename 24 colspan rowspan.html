<!DOCTYPE html>
<html>
<head>
<title>Tabla centrada</title>
<style>
table {
  margin: auto;
}
</style>
</head>
<body>

<table border="1">
<tr>
<th colspan="3">Horario Semanal</th>
</tr>

<tr>
<th>Día</th>
<th>Materia</th>
<th>Horario</th>
</tr>

<tr>
<td rowspan="2">Miércoles</td>
<td>Matemáticas</td>
<td>7:00 - 9:00</td>
</tr>
<tr>
<td>Física</td>
<td>9:00 - 11:00</td>
</tr>

<tr>
<td rowspan="2">Jueves</td>
<td>Química</td>
<td>8:00 - 10:00</td>
</tr>
<tr>
<td>Biología</td>
<td>10:00 - 12:00</td>
</tr>

<tr>
<td>Viernes</td>
<td colspan="2">Taller de Proyectos</td>
</tr>

<tr>
<td>Sábado</td>
<td colspan="2">Actividad Deportiva</td>
</tr>

<tr>
<td>Domingo</td>
<td colspan="3">Día de descanso</td>
</tr>

</table>

</body>
</html>
